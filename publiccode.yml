description:
  de:
    localisedName: Boschettissimo
    shortDescription: Automatisierte Erfassung und ökologische Bewertung von Bäumen
      mittels Fernerkundungs- und Geodaten
    longDescription: Dieses Repository beinhaltet den Quellcode und die
      Dokumentation für die Machbarkeitsstudie zur digitalen Erfassung und
      Bewertung von Bäumen auf der landwirtschaftlichen Nutzfläche im Auftrag
      des Bundesamtes für Landwirtschaft (BLW). Ziel ist die Entwicklung eines
      Systems, das weg von starren Massnahmenvorschriften (heutiges
      Direktzahlungssystem) hin zu einer ergebnisorientierten Förderung von
      Bäumen in der Landwirtschaft führt. Anstatt die Pflege
      massnahmenorientiert vorzuschreiben, soll der effektive ökologische Wert
      eines Baumes mittels Fernerkundungsdaten ermittelt und vergütet werden.
    features:
      - data-science
      - remote-sensing
